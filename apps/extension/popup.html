<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Rabbit Hole</title>
  <style>
    body {
      width: 280px;
      padding: 12px 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #555; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .hint { color: #666; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <button id="open">Open in Rabbit Hole</button>
  <p class="hint" id="hint">Sends selection, or this page’s URL if none.</p>
  <script src="handoff.js"></script>
  <script src="popup.js"></script>
</body>
</html>
